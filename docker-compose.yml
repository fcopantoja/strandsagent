services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://strands:strands@db:5432/strandsagent
    volumes:
      - ./app:/app/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: strandsagent
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strands -d strandsagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
